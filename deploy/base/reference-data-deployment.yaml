---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    fdk.service: reference-data
  name: reference-data
spec:
  replicas: 1
  selector:
    matchLabels:
      fdk.service: reference-data
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        fdk.service: reference-data
    spec:
      containers:
        - name: reference-data
          env:
            - name: POSTGRESQL_HOST
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: HOST
            - name: POSTGRESQL_DB
              valueFrom:
                secretKeyRef:
                  name: reference-data
                  key: POSTGRESQL_DB
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: reference-data
                  key: POSTGRESQL_USER
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: reference-data
                  key: POSTGRESQL_PASSWORD
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: reference-data
                  key: API_KEY
            - name: CATALOG_ADMIN_SERVICE_URI
              valueFrom:
                secretKeyRef:
                  name: commonurl
                  key: CATALOG_ADMIN_SERVICE_HOST
            - name: CORS_ORIGIN_PATTERNS
              valueFrom:
                secretKeyRef:
                  name: reference-data
                  key: CORS_ORIGIN_PATTERNS
          image: reference-data
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "1Gi"
              cpu: "25m"
            limits:
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /reference-data/actuator/ping
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
            successThreshold: 1
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /reference-data/actuator/ready
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
            successThreshold: 1
            failureThreshold: 5
      restartPolicy: Always
